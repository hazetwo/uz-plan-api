openapi: 3.0.3
info:
  title: UZ Plan API
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
paths:
  /fields:
    get:
      summary: List study fields
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
  /groups/{id}:
    get:
      summary: List groups for a field
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
  /schedule/{id}:
    get:
      summary: Get schedule for a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: day
          in: query
          schema:
            type: string
            format: date
          description: Filter by a specific day (ISO 8601, e.g. 2024-10-07)
        - name: week
          in: query
          schema:
            type: string
            format: date
          description: Filter by the week containing this date
        - name: subgroup
          in: query
          schema:
            $ref: "#/components/schemas/Subgroup"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entry"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    Subgroup:
      type: string
      enum: [A, B]
    Entry:
      type: object
      properties:
        subgroup:
          oneOf:
            - $ref: "#/components/schemas/Subgroup"
            - type: "null"
        start:
          type: [string, "null"]
        end:
          type: [string, "null"]
        date:
          type: [string, "null"]
          format: date
        subject:
          type: [string, "null"]
        classType:
          type: [string, "null"]
        teacher:
          type: [string, "null"]
        classroom:
          type: [string, "null"]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
